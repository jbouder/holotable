services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: holotable
      POSTGRES_PASSWORD: holotable
      POSTGRES_DB: holotable
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U holotable"]
      interval: 5s
      timeout: 3s
      retries: 20

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    environment:
      CLICKHOUSE_DB: metrics
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-changeme}
      # Consumed by the read-only user init script.
      CH_METRICS_USERNAME: ${CH_METRICS_USERNAME:-metrics_ro}
      CH_METRICS_PASSWORD: ${CH_METRICS_PASSWORD:-readonly}
    ports:
      - "8123:8123"
    volumes:
      - chdata:/var/lib/clickhouse
      - ./clickhouse/init:/docker-entrypoint-initdb.d:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import:ro

  migrate:
    build:
      context: .
    command: ["node", "node_modules/.bin/tsx", "scripts/migrate.ts"]
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-holotable}:${POSTGRES_PASSWORD:-holotable}@postgres:5432/holotable"
    depends_on:
      postgres:
        condition: service_healthy

  app:
    build:
      context: .
    environment:
      NODE_ENV: production
      DATABASE_URL: "postgresql://${POSTGRES_USER:-holotable}:${POSTGRES_PASSWORD:-holotable}@postgres:5432/holotable"
      SESSION_SECRET: ${SESSION_SECRET:?set a strong 32+ char SESSION_SECRET}
      DEV_AUTH_ENABLED: "false"
      # Credentials the app resolves for the 'CH_METRICS' source secret_ref.
      CH_METRICS_USERNAME: ${CH_METRICS_USERNAME:-metrics_ro}
      CH_METRICS_PASSWORD: ${CH_METRICS_PASSWORD:-readonly}
      # AI provider (see .env.example / docs).
      AI_PROVIDER: ${AI_PROVIDER:-openai-compatible}
      AI_MODEL: ${AI_MODEL:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AI_GATEWAY_API_KEY: ${AI_GATEWAY_API_KEY:-}
      # Keycloak OIDC.
      OIDC_ISSUER: ${OIDC_ISSUER:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_JWKS_URL: ${OIDC_JWKS_URL:-}
      OIDC_GROUPS_CLAIM: ${OIDC_GROUPS_CLAIM:-groups}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  seed:
    build:
      context: .
    command: ["node", "node_modules/.bin/tsx", "scripts/seed.ts"]
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-holotable}:${POSTGRES_PASSWORD:-holotable}@postgres:5432/holotable"
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-changeme}
      CH_METRICS_HOST: clickhouse
      CH_METRICS_PORT: "8123"
      SEED_INTERVAL_MS: "2000"
    depends_on:
      clickhouse:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
  chdata:
